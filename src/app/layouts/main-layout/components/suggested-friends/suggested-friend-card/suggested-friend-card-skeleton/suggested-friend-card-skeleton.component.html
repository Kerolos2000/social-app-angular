@for (item of items; track $index) {
  <div class="card-secondary animate-pulse">
    <div class="flex items-start gap-2">
      <div class="avatar-lg bg-gray-200 rounded-md"></div>

      <div class="flex-1 min-w-0 flex flex-col gap-2">
        <div class="flex items-center justify-between gap-2">
          <div class="flex flex-col gap-1 flex-1">
            <div class="h-4 w-24 bg-gray-200 rounded-md"></div>
            <div class="h-3 w-16 bg-gray-200 rounded-md"></div>
          </div>

          <div class="h-8 w-20 bg-gray-200 rounded-md"></div>
        </div>

        <div class="flex items-center gap-2">
          <div class="h-5 w-20 bg-gray-200 rounded-md"></div>
          <div class="h-5 w-16 bg-gray-200 rounded-md"></div>
        </div>
      </div>
    </div>
  </div>
}
