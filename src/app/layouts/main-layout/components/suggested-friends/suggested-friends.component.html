<div class="card-secondary flex flex-col gap-4">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-user-group text-brand"></i>
      <h2 class="font-bold text-sm">Suggested Friends</h2>
    </div>
    <span class="badge-primary">{{ query.data()?.length ?? "-" }}</span>
  </div>

  <div class="flex flex-col gap-4">
    <div class="input-field">
      <i class="input-icon fa-solid fa-magnifying-glass text-muted"></i>
      <input type="text" class="input" placeholder="Search Friends" />
    </div>

    <div class="grid gap-2">
      @if (query.isLoading()) {
        <app-suggested-friend-card-skeleton class="space-y-2" />
      } @else {
        @for (friend of query.data(); track friend._id) {
          <app-suggested-friend-card [friend]="friend" />
        }
      }
    </div>
  </div>

  <button class="btn-outline w-full">View more</button>
</div>
