<div class="bg-white rounded-md overflow-hidden shadow-sm">
  <!-- Cover Photo -->
  <div class="h-50 bg-brand relative flex justify-end p-4">
    @if (isOwnProfile()) {
      <button
        class="bg-white/90 border-none px-4 py-2 rounded-md cursor-pointer flex items-center gap-2 font-medium hover:bg-white hover:-translate-y-0.5 transition-all h-fit"
      >
        <i class="fa-solid fa-camera"></i>
        Add cover
      </button>
    }
  </div>

  <!-- Profile Info -->
  <div
    class="px-8 pb-8 relative flex flex-col md:flex-row items-center md:items-end gap-4 -mt-15"
  >
    <div
      class="w-37.5 h-37.5 rounded-md border-4 border-white bg-white relative shadow-md shrink-0"
    >
      <img
        [src]="profile()?.photo"
        alt="Avatar"
        class="w-full h-full rounded-md object-cover"
      />
      @if (isOwnProfile()) {
        <div
          class="absolute bottom-2 right-2 bg-white rounded p-1.5 shadow-sm cursor-pointer border border-gray-100 hover:bg-gray-50 transition-colors"
        >
          <i class="fa-solid fa-camera text-brand"></i>
        </div>
      }
    </div>

    <div class="flex-1 pb-2 text-center md:text-left">
      <h1 class="text-2xl font-bold m-0 text-gray-900">
        {{ profile()?.name }}
      </h1>
      <span class="text-gray-500 text-base">
        @{{ profile()?.username || profile()?.email?.split("@")?.[0] }}
      </span>
    </div>
  </div>

  <ng-content select="[stats]"></ng-content>
</div>
