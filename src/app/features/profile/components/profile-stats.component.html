<div class="grid grid-cols-1 md:grid-cols-3 gap-4 px-8 pb-8">
  <div class="bg-white border border-gray-100 rounded-md p-4 text-center">
    <div class="text-2xs text-gray-400 font-bold uppercase tracking-wider mb-2">
      Followers
    </div>
    <div class="text-2xl font-extrabold text-gray-900">
      {{ followersCount() }}
    </div>
  </div>
  <div class="bg-white border border-gray-100 rounded-md p-4 text-center">
    <div class="text-2xs text-gray-400 font-bold uppercase tracking-wider mb-2">
      Following
    </div>
    <div class="text-2xl font-extrabold text-gray-900">
      {{ followingCount() }}
    </div>
  </div>
  <div class="bg-white border border-gray-100 rounded-md p-4 text-center">
    <div class="text-2xs text-gray-400 font-bold uppercase tracking-wider mb-2">
      Bookmarks
    </div>
    <div class="text-2xl font-extrabold text-gray-900">
      {{ bookmarksCount() }}
    </div>
  </div>
</div>
