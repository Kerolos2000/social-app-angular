@if (profileQuery.isLoading()) {
  <div class="max-w-250 mx-auto p-5 min-h-screen bg-gray-50">
    <div class="animate-pulse h-75 bg-gray-200 rounded-md mb-6"></div>
  </div>
} @else {
  <div class="flex flex-col gap-4">
    <!-- Profile Header & Stats -->
    <app-profile-header [profile]="profile()" [isOwnProfile]="isOwnProfile()">
      <app-profile-stats
        stats
        [followersCount]="profile()?.followers?.length || 0"
        [followingCount]="profile()?.following?.length || 0"
        [bookmarksCount]="isOwnProfile() ? bookmarks().length || 0 : 0"
      />
    </app-profile-header>

    <!-- Sidebar (About) -->
    <app-profile-about [profile]="profile()" />

    <!-- Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-[1fr,300px] gap-4">
      <!-- Main Content (Feed) -->
      <app-profile-feed
        [posts]="posts()"
        [isLoading]="postsQuery.isLoading()"
        [activeTab]="activeTab()"
        [isOwnProfile]="isOwnProfile()"
        [currentUser]="currentUser()"
        (activeTabChange)="switchTab($event)"
      />
    </div>
  </div>
}
