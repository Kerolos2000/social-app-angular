<div class="flex gap-2 group">
  <img
    appImgFallback="avatar-image-broken.png"
    [src]="comment().commentCreator.photo"
    class="avatar-md"
    [alt]="comment().commentCreator.name"
  />
  <div class="flex flex-col gap-1 flex-1 min-w-0">
    <div class="card-secondary w-fit flex flex-col gap-1 max-w-[90%]">
      <p class="text-sm font-bold">
        {{ comment().commentCreator.name }}
      </p>
      <p class="text-xs font-semibold text-body-subtle wrap-break-word">
        {{ comment().content }}
      </p>
      @if (comment().image) {
        <img
          [src]="comment().image"
          class="w-80 aspect-video object-contain"
          [alt]="'Image by ' + comment().commentCreator.name"
        />
      }
    </div>
    <div
      class="flex items-center gap-4 px-2 text-sm font-semibold text-muted mt-0.5"
    >
      <span class="text-xs">{{ comment().createdAt | relativeTime }}</span>
      <button class="link">Like</button>
      <button class="link">Reply</button>
    </div>
  </div>
</div>
