<div class="flex flex-col gap-3">
  @for (item of items; track $index) {
    <div class="flex gap-2 animate-pulse">
      <!-- Avatar -->
      <div
        class="bg-gray-200 shrink-0"
        [class]="isReply ? 'avatar-sm' : 'avatar-md'"
      ></div>

      <div class="flex flex-col gap-1 flex-1 min-w-0">
        <!-- Name & Content Bubble -->
        <div
          class="card-secondary flex flex-col gap-2 w-fit max-w-[90%] py-2! px-3!"
        >
          <div class="h-3 w-24 bg-gray-200 rounded-md"></div>
          <div class="h-2.5 w-48 bg-gray-100 rounded-md"></div>
        </div>

        <!-- Action Links -->
        <div class="flex items-center gap-4 px-2 mt-0.5">
          <div class="h-2.5 w-16 bg-gray-100/70 rounded-md"></div>
          <div class="h-2.5 w-8 bg-gray-50 rounded-md"></div>
          @if (!isReply) {
            <div class="h-2.5 w-10 bg-gray-50 rounded-md"></div>
          }
        </div>
      </div>
    </div>
  }
</div>
