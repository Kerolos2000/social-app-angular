<div class="card-secondary p-4 flex flex-col gap-2">
  <app-post-header [post]="post()" (onEdit)="isEditing.set(true)" />

  <app-post-content 
    [body]="post().body" 
    [image]="post().image" 
    [isEditing]="isEditing()"
    [isSaving]="updateMutation.isPending()"
    (onCancel)="isEditing.set(false)"
    (onSave)="saveEdit($event)"
  />

  <div class="flex flex-col gap-2">
    <app-post-actions
      [postId]="post().id"
      [isLiked]="isLiked()"
      [likesCount]="post().likesCount"
      [commentsCount]="post().commentsCount"
      (onCommentClick)="toggleCommentInput()"
    />

    <app-post-comments
      [post]="post()"
      [user]="user()"
      [isInputVisible]="isCommentInputVisible()"
      (onViewAll)="toggleCommentInput()"
    />
  </div>
</div>
