<button
  type="button"
  data-dropdown-toggle="dropdown-privacy"
  class="btn-ghost-outline btn-sm"
>
  <i [class]="selectedOption()?.icon + ' text-brand'"></i>
  <span>{{ selectedOption()?.label }}</span>
  <i class="fa-solid fa-chevron-down text-2xs ms-1"></i>
</button>

<div
  id="dropdown-privacy"
  class="z-10 hidden bg-neutral-primary-medium border border-default-medium rounded-md shadow-md w-48"
>
  @for (option of options(); track option.value) {
    <button
      type="button"
      (click)="setVisibility(option.value)"
      class="nav-link-hover flex justify-between"
    >
      <span class="flex items-center gap-2">
        <i [class]="option.icon + ' w-4 text-center'"></i>
        {{ option.label }}
      </span>

      @if (control().value === option.value) {
        <i class="fa-solid fa-check text-brand"></i>
      }
    </button>
  }
</div>
