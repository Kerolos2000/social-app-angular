@for (item of items(); track $index) {
  <div class="card-secondary mb-4 p-4 flex flex-col gap-2 animate-pulse">
    <!-- Header Skeleton -->
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Avatar matching avatar-lg -->
        <div class="avatar-lg bg-gray-200 shrink-0"></div>

        <div class="flex flex-col">
          <!-- Name matching text-sm font-bold -->
          <div class="h-4 w-32 bg-gray-200 rounded-md"></div>
          <!-- Meta Info matching text-[11px] and gap-1.5 -->
          <div class="flex items-center gap-1.5 mt-1.5">
            <div class="h-2.5 w-20 bg-gray-100 rounded-md"></div>
            <div class="w-1 h-1 rounded-full bg-gray-100"></div>
            <div class="h-2.5 w-14 bg-gray-100 rounded-md"></div>
            <div class="w-1 h-1 rounded-full bg-gray-100"></div>
            <div class="h-2.5 w-10 bg-gray-100 rounded-md"></div>
          </div>
        </div>
      </div>

      <!-- Right Action Buttons -->
      <div class="flex items-center gap-2">
        <div class="h-8 w-8 bg-gray-100/60 rounded-md"></div>
        <div class="h-8 w-8 bg-gray-100/60 rounded-md"></div>
      </div>
    </div>

    <!-- Body Skeleton -->
    <div class="flex flex-col gap-2 mt-1">
      <!-- Text Lines matching p text-sm -->
      <div class="flex flex-col gap-2">
        <div class="h-3 w-full bg-gray-100 rounded-md"></div>
        <div class="h-3 w-[88%] bg-gray-100 rounded-md"></div>
        <div class="h-3 w-[45%] bg-gray-100 rounded-md"></div>
      </div>

      <!-- Image Area matching rounded-md -->
      <div
        class="h-56 w-full bg-gray-200/50 rounded-md border border-border/20 mt-1"
      ></div>
    </div>

    <!-- Actions Skeleton -->
    <div class="flex flex-col gap-3 mt-1">
      <!-- Stats Row matching text-xs -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <!-- Thumbs up icon matching w-5 h-5 -->
          <div
            class="w-5 h-5 rounded-full bg-gray-200 border-2 border-white"
          ></div>
          <div class="h-3 w-12 bg-gray-100 rounded-md"></div>
        </div>
        <div class="flex items-center gap-3">
          <div class="h-3 w-16 bg-gray-50 rounded-md"></div>
          <div class="h-3 w-14 bg-gray-50 rounded-md"></div>
          <div class="h-3 w-16 bg-gray-50 rounded-md"></div>
        </div>
      </div>

      <!-- Buttons Grid matching grid-cols-3 and gap-2 -->
      <div class="grid grid-cols-3 gap-2">
        <div class="h-10 bg-gray-50 rounded-md border border-border/10"></div>
        <div class="h-10 bg-gray-50 rounded-md border border-border/10"></div>
        <div class="h-10 bg-gray-50 rounded-md border border-border/10"></div>
      </div>
    </div>
  </div>
}
